<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDHerreria</title>
    <style>
        /* Estilo general inspirado en taller industrial moderno */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background: radial-gradient(circle at center, #1e2024 0%, #111215 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        .container {
            padding: 30px;
            max-width: 400px;
            width: 90%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        /* Título Principal */
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Firma del desarrollador */
        .signature {
            font-size: 14px;
            color: #6366f1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            display: block;
        }

        /* Ícono central minimalista */
        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: 20px;
            margin: 0 auto 35px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(29, 78, 216, 0.4);
        }

        .icon-box svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        /* Botón de acceso de alta fidelidad */
        .btn-modulo {
            display: block;
            background: #ffffff;
            color: #111215;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .btn-modulo:hover {
            transform: translateY(-2px);
            background: #f3f4f6;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        .btn-modulo:active {
            transform: translateY(0);
        }

        /* Nota al pie discreta */
        .footer-text {
            margin-top: 30px;
            font-size: 11px;
            color: #555861;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M22.7,19.3L18.4,15c0.7-1.3,0.5-3.1-0.6-4.2c-1.2-1.2-3.2-1.2-4.4,0l-1.4,1.4l-1.4-1.4L15,6.4l-1.4-1.4L9.2,9.4L5,5.2L3.6,6.6l4.2,4.2l-4.4,4.4c-1.2,1.2-1.2,3.2,0,4.4c1.1,1.1,2.8,1.3,4.2,0.6l4.3,4.3c0.4,0.4,1,0.4,1.4,0l4.2-4.2C23.1,20.3,23.1,19.7,22.7,19.3z M6.4,18.2c-0.4-0.4-0.4-1,0-1.4l3.7-3.7l1.4,1.4l-3.7,3.7C7.4,18.6,6.8,18.6,6.4,18.2z"/>
            </svg>
        </div>

        <h1>SDHerreria</h1>
        <span class="signature">by jorechpsv</span>

        <a href="./generador-laberinto/index.html" class="btn-modulo">
            🚪 Puerta Laberinto
        </a>

        <div class="footer-text">
            Librería Santo Domingo • Control de Producción
        </div>
    </div>

</body>
</html>
