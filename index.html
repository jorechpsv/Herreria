<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDHerreria - Control de Producción</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #1e2024 0%, #111215 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box; padding: 20px;
        }
        .container {
            padding: 30px; max-width: 500px; width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 32px; font-weight: 800; margin: 0; color: #fff; }
        .signature { font-size: 13px; color: #6366f1; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block; }
        
        .seccion-cat { text-align: left; margin-bottom: 25px; }
        .cat-titulo { font-size: 14px; color: #8a8f98; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px;}
        
        .btn-link {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.05); color: #fff;
            text-decoration: none; padding: 14px 18px; border-radius: 12px;
            font-weight: 600; font-size: 15px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s, transform 0.2s;
        }
        .btn-link:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-2px); }
        .badge { font-size: 11px; background: #6366f1; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        
        .footer-text { margin-top: 30px; font-size: 11px; color: #555861; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SDHerreria</h1>
        <span class="signature">by jorechpsv</span>

        <div class="seccion-cat">
            <div class="cat-titulo">🚪 Catálogo de Puertas</div>
            <a href="./puertas/modelo01/index.html" class="btn-link">
                <span>Puerta Cuadros Geométricos</span>
                <span class="badge">Modelo 01</span>
            </a>
        </div>

        <div class="seccion-cat">
            <div class="cat-titulo">🪟 Catálogo de Ventanas / Balcones</div>
            <a href="./ventanas/modelo01/index.html" class="btn-link">
                <span>Balcón Laberinto Concéntrico</span>
                <span class="badge">Modelo 01</span>
            </a>
        </div>

        <div class="footer-text">
            Librería Santo Domingo • Control de Producción
        </div>
    </div>

</body>
</html>
