<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador Puerta Estructural - Modelo 01</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            padding: 20px; 
            background: #f0f2f5; 
            margin: 0; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        
        .col-controles { 
            width: 340px; 
            min-width: 340px;
            padding: 20px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            margin-right: 20px; 
            box-sizing: border-box; 
        }
        .col-visor { 
            flex-grow: 1; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            margin-right: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-sizing: border-box; 
        }
        .col-reporte { 
            width: 440px; 
            min-width: 440px;
            padding: 20px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            box-sizing: border-box; 
        }

        .control-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; color: #444; font-size: 13px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        .btn-pdf { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-pdf:hover { background: #1b5e20; }
        
        .compra-box { padding: 12px; background: #fff8e1; border-left: 4px solid #ffb300; border-radius: 4px; color: #5d4037; font-size: 13.5px; margin-bottom: 15px; }
        .compra-box h4 { margin: 0 0 8px 0; font-size: 15px; color: #5d4037; border-bottom: 1px solid #ffe082; padding-bottom: 4px; }
        
        svg { border: 1px solid #ccc; background: #fff; max-height: 80vh; max-width: 100%; border-radius: 4px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 15px; }
        th, td { border: 1px solid #e0e0e0; padding: 7px; text-align: left; }
        th { background-color: #2b2b2b; color: white; }
        .subtitulo-tabla { background-color: #f1f3f5; font-weight: bold; color: #495057; font-size: 11.5px; }

        @media (max-width: 950px) {
            body { flex-direction: column; padding: 10px; }
            .col-controles, .col-visor, .col-reporte { width: 100% !important; min-width: 100% !important; margin-right: 0 !important; margin-bottom: 15px; }
            svg { max-height: 60vh; width: 100%; }
        }
    </style>
</head>
<body>

<div class="col-controles">
    <h2 style="margin-top:0; color:#111;">Puertas - Modelo 01</h2>
    <p style="font-size:12px; color:#666; margin-top:-10px;">Diseño Real: Bastidor + 4 Varillas por Lado</p>
    <button class="btn-pdf" onclick="window.print()">🖨️ Imprimir Guía de Cortes</button>
    
    <div class="control-group">
        <label>Ancho Total Puerta (cm):</label>
        <input type="number" id="ancho" value="95" oninput="calcularPuerta()">
    </div>
    <div class="control-group">
        <label>Alto Total Puerta (cm):</label>
        <input type="number" id="alto" value="210" oninput="calcularPuerta()">
    </div>
    <div class="control-group">
        <label>Alto Zócalo / Lámina Base (cm):</label>
        <input type="number" id="zocalo" value="40" oninput="calcularPuerta()">
    </div>
    <div class="control-group">
        <label>Ancho Cuadros Centrales (cm):</label>
        <input type="number" id="anchoCuadro" value="25" oninput="calcularPuerta()">
    </div>
    <div class="control-group">
        <label>Separación Varillas de 1/2" (cm):</label>
        <input type="number" id="sepVarillas" value="8" oninput="calcularPuerta()">
    </div>
</div>

<div class="col-visor">
    <svg id="lienzo" viewBox="0 0 95 210"></svg>
</div>

<div class="col-reporte">
    <div class="compra-box">
        <h4>📋 Estimación de Barras (6 metros)</h4>
        <div id="detalleCompra">Calculando...</div>
    </div>
    <h3 style="margin-top:0;">✂️ Orden de Corte</h3>
    <table id="tablaCortes">
        <thead>
            <tr><th>Material</th><th>Ubicación / Pieza</th><th>Medida</th><th>Cant</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
function calcularPuerta() {
    const ancho = parseFloat(document.getElementById('ancho').value) || 95;
    const alto = parseFloat(document.getElementById('alto').value) || 210;
    const zocalo = parseFloat(document.getElementById('zocalo').value) || 40;
    const wCuadro = parseFloat(document.getElementById('anchoCuadro').value) || 25;
    const hCuadro = wCuadro;
    const sepVarillas = parseFloat(document.getElementById('sepVarillas').value) || 8;
    
    const platina = 2.54;       // Platina externa de 1"
    const encajuelado = 3.81;   // Bastidor de ángulo encajuelado (Caja azul)
    const hCuadrado = 1.27;     // Hierro cuadrado de 1/2"
    
    const lienzo = document.getElementById('lienzo');
    lienzo.setAttribute('viewBox', `0 0 ${ancho} ${alto}`);
    lienzo.innerHTML = '';
    
    // 1. Dibujar Platina Exterior Perimetral (Gris/Plata externo)
    const rPlatina = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rPlatina.setAttribute("x", platina/2); rPlatina.setAttribute("y", platina/2);
    rPlatina.setAttribute("width", ancho - platina); rPlatina.setAttribute("height", alto - platina);
    rPlatina.setAttribute("fill", "none"); rPlatina.setAttribute("stroke", "#78909c"); rPlatina.setAttribute("stroke-width", platina);
    lienzo.appendChild(rPlatina);
    
    const xPuertaMin = platina;
    const wPuertaInterna = ancho - (platina * 2);
    const yZocaloTop = alto - platina - zocalo;
    
    // 2. Zócalo Inferior (Lámina)
    const rZocalo = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rZocalo.setAttribute("x", xPuertaMin); rZocalo.setAttribute("y", yZocaloTop);
    rZocalo.setAttribute("width", wPuertaInterna); rZocalo.setAttribute("height", zocalo);
    rZocalo.setAttribute("fill", "#37474f"); rZocalo.setAttribute("opacity", "0.85");
    lienzo.appendChild(rZocalo);
    
    // 3. BASTIDOR DE ÁNGULO ENCAJUELADO (El marco azul principal)
    const rBastidor = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rBastidor.setAttribute("x", xPuertaMin + encajuelado/2); rBastidor.setAttribute("y", xPuertaMin + encajuelado/2);
    rBastidor.setAttribute("width", wPuertaInterna - encajuelado); rBastidor.setAttribute("height", (yZocaloTop - xPuertaMin) - encajuelado/2);
    rBastidor.setAttribute("fill", "none"); rBastidor.setAttribute("stroke", "#002fa7"); rBastidor.setAttribute("stroke-width", encajuelado);
    lienzo.appendChild(rBastidor);

    // Límites internos del bastidor azul
    const xIntBastidorMin = xPuertaMin + encajuelado;
    const xIntBastidorMax = xPuertaMin + wPuertaInterna - encajuelado;
    const wIntBastidor = xIntBastidorMax - xIntBastidorMin;
    const yIntBastidorMin = xPuertaMin + encajuelado;
    const yIntBastidorMax = yZocaloTop - encajuelado;
    const hVarillasVerticales = yIntBastidorMax - yIntBastidorMin;
    
    // 4. Eje Central Vertical (Ángulo Encajuelado)
    const xCentroPuerta = ancho / 2;
    const lPosteCentro = document.createElementNS("http://www.w3.org/2000/svg", "line");
    lPosteCentro.setAttribute("x1", xCentroPuerta); lPosteCentro.setAttribute("y1", yIntBastidorMin);
    lPosteCentro.setAttribute("x2", xCentroPuerta); lPosteCentro.setAttribute("y2", yIntBastidorMax);
    lPosteCentro.setAttribute("stroke", "#1a1a1a"); lPosteCentro.setAttribute("stroke-width", encajuelado);
    lienzo.appendChild(lPosteCentro);
    
    // 5. Varillas de 1/2" (4 de cada lado del centro)
    let totalCmsCuadrado = 0;
    
    let xVarillasIzq = [];
    let xVarillasDer = [];
    
    // Generamos las 4 posiciones del lado izquierdo
    for(let i=1; i<=4; i++) {
        let xPos = xIntBastidorMin + (i * sepVarillas);
        xVarillasIzq.push(xPos);
    }
    // Generamos las 4 posiciones del lado derecho en espejo
    for(let i=1; i<=4; i++) {
        let xPos = xIntBastidorMax - (i * sepVarillas);
        xVarillasDer.push(xPos);
    }
    
    // Dibujar todas las varillas verticales largas (Rojas)
    const todasLasVarillasX = [...xVarillasIzq, ...xVarillasDer];
    todasLasVarillasX.forEach(xV => {
        const vLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        vLine.setAttribute("x1", xV); vLine.setAttribute("y1", yIntBastidorMin);
        vLine.setAttribute("x2", xV); vLine.setAttribute("y2", yIntBastidorMax);
        vLine.setAttribute("stroke", "#d32f2f"); vLine.setAttribute("stroke-width", hCuadrado);
        lienzo.appendChild(vLine);
    });
    totalCmsCuadrado += (hVarillasVerticales * todasLasVarillasX.length);
    
    // La varilla más interna de cada lado (la cuarta contando desde afuera)
    const xVarillaInternaIzq = xVarillasIzq[3];
    const xVarillaInternaDer = xVarillasDer[3];
    
    // 6. Los 3 Cuadros Centrales en el poste central
    const espacioEntreCentros = hVarillasVerticales / 3;
    
    for (let i = 0; i < 3; i++) {
        const yCentroMódulo = yIntBastidorMin + (espacioEntreCentros * i) + (espacioEntreCentros / 2);
        const yTopCuadro = yCentroMódulo - (hCuadro / 2);
        
        // Dibujar el cuadro central de 1/2"
        const rCuadro = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rCuadro.setAttribute("x", xCentroPuerta - (wCuadro / 2)); rCuadro.setAttribute("y", yTopCuadro);
        rCuadro.setAttribute("width", wCuadro); rCuadro.setAttribute("height", hCuadro);
        rCuadro.setAttribute("fill", "none"); rCuadro.setAttribute("stroke", "#1a1a1a"); rCuadro.setAttribute("stroke-width", hCuadrado);
        lienzo.appendChild(rCuadro);
        totalCmsCuadrado += (wCuadro * 4);
        
        // Brazos horizontales cortos que se enganchan a la 4ta varilla
        const yBrazoUpper = yTopCuadro + (hCuadro * 0.25);
        const yBrazoLower = yTopCuadro + (hCuadro * 0.75);
        const largoBrazoAcople = (xCentroPuerta - wCuadro/2) - xVarillaInternaIzq;
        
        [yBrazoUpper, yBrazoLower].forEach(yB => {
            // Brazo izquierdo hacia la varilla
            const b1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
            b1.setAttribute("x1", xVarillaInternaIzq); b1.setAttribute("y1", yB);
            b1.setAttribute("x2", xCentroPuerta - wCuadro/2); b1.setAttribute("y2", yB);
            b1.setAttribute("stroke", "#1a1a1a"); b1.setAttribute("stroke-width", hCuadrado);
            lienzo.appendChild(b1);
            
            // Brazo derecho hacia la varilla
            const b2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
            b2.setAttribute("x1", xCentroPuerta + wCuadro/2); b2.setAttribute("y1", yB);
            b2.setAttribute("x2", xVarillaInternaDer); b2.setAttribute("y2", yB);
            b2.setAttribute("stroke", "#1a1a1a"); b2.setAttribute("stroke-width", hCuadrado);
            lienzo.appendChild(b2);
            
            totalCmsCuadrado += (largoBrazoAcople * 2);
        });
    }
    
    // ORDEN DE CORTES
    const totalCmsPlatina = (ancho * 2) + (alto * 2);
    
    const bastidorVert = yZocaloTop - xPuertaMin;
    const bastidorHoriz = wPuertaInterna;
    const posteCentral = hVarillasVerticales;
    const totalCmsAngulo = (bastidorVert * 4) + (bastidorHoriz * 4) + (posteCentral * 2); // Multiplicado x2 para encajuelar
    
    const largoUnicoBrazo = (xCentroPuerta - wCuadro/2) - xVarillaInternaIzq;
    
    const body = document.querySelector('#tablaCortes tbody');
    body.innerHTML = `
        <tr class="subtitulo-tabla"><td colspan="4">PASO 1: CEJA / MARCO PERIMETRAL</td></tr>
        <tr><td>Platina 1"</td><td>Superior / Inferior</td><td><b>${ancho.toFixed(1)} cm</b></td><td><strong>2</strong></td></tr>
        <tr><td>Platina 1"</td><td>Laterales Izq / Der</td><td><b>${alto.toFixed(1)} cm</b></td><td><strong>2</strong></td></tr>
        
        <tr class="subtitulo-tabla"><td colspan="4">PASO 2: BASTIDOR DE LA PUERTA (ÁNGULO ENCAJUELADO)</td></tr>
        <tr><td>Ángulo (Para Tubo)</td><td>Postes Bastidor Vertical</td><td><b>${bastidorVert.toFixed(1)} cm</b></td><td><strong>4</strong> <small>(2 pares)</small></td></tr>
        <tr><td>Ángulo (Para Tubo)</td><td>Cabezales Bastidor Horiz.</td><td><b>${bastidorHoriz.toFixed(1)} cm</b></td><td><strong>4</strong> <small>(2 pares)</small></td></tr>
        <tr><td>Ángulo (Para Tubo)</td><td>Poste Eje Central</td><td><b>${posteCentral.toFixed(1)} cm</b></td><td><strong>2</strong> <small>(1 par)</small></td></tr>
        
        <tr class="subtitulo-tabla"><td colspan="4">PASO 3: PARRILLA DE RESISTENCIA (HIERRO CUADRADO 1/2")</td></tr>
        <tr><td>Hierro Cuadrado 1/2"</td><td>Varillas Verticales Largas</td><td><b>${hVarillasVerticales.toFixed(1)} cm</b></td><td><strong>8</strong> <small>(4 izq + 4 der)</small></td></tr>
        
        <tr class="subtitulo-tabla"><td colspan="4">PASO 4: EMBLEMA CENTRAL (HIERRO CUADRADO 1/2")</td></tr>
        <tr><td>Hierro Cuadrado 1/2"</td><td>Tramos para 3 Cuadros</td><td><b>${wCuadro.toFixed(1)} cm</b></td><td><strong>12</strong></td></tr>
        <tr><td>Hierro Cuadrado 1/2"</td><td>Brazos de Amarre Horiz.</td><td><b>${largoUnicoBrazo.toFixed(1)} cm</b></td><td><strong>12</strong></td></tr>
        
        <tr class="subtitulo-tabla"><td colspan="4">PASO 5: COMPLEMENTOS</td></tr>
        <tr><td>Lámina Ciega</td><td>Zócalo Inferior</td><td><b>${wPuertaInterna.toFixed(1)} x ${zocalo.toFixed(1)} cm</b></td><td><strong>1</strong></td></tr>
    `;
    
    document.getElementById('detalleCompra').innerHTML = `
        <div><b>Platina 1":</b> ${Math.ceil((totalCmsPlatina*1.07)/600)} barra(s) <small>(${totalCmsPlatina.toFixed(0)} cm)</small></div>
        <div><b>Ángulo Metálico:</b> ${Math.ceil((totalCmsAngulo*1.07)/600)} barra(s) de 6m <small>(${totalCmsAngulo.toFixed(0)} cm para encajuelar)</small></div>
        <div><b>Hierro Cuadrado 1/2":</b> ${Math.ceil((totalCmsCuadrado*1.07)/600)} barra(s) <small>(${totalCmsCuadrado.toFixed(0)} cm)</small></div>
    `;
}

calcularPuerta();
</script>
</body>
</html>
