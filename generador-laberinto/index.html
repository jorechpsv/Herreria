<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculador de Cortes Estilo LEGO - Herrería</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; padding: 20px; background: #f0f2f5; margin: 0; height: 100vh; box-sizing: border-box; }
        .col-controles { width: 320px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-right: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        .col-visor { flex-grow: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-right: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; box-sizing: border-box; }
        .col-reporte { width: 460px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        .panel-inputs { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .panel-tabla { overflow-y: auto; flex-grow: 1; margin-top: 10px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; color: #444; font-size: 13px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: white; }
        .balance-panel { background: #e8f5e9; padding: 12px; border-left: 4px solid #2e7d32; border-radius: 4px; font-size: 12.5px; margin-bottom: 15px; color: #1b5e20; }
        .btn-limpiar { width: 100%; padding: 10px; background: #d32f2f; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 10px; }
        .btn-limpiar:hover { background: #c62828; }
        .btn-pdf { width: 100%; padding: 12px; background: #1e88e5; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-pdf:hover { background: #1565c0; }
        .compra-box { padding: 12px; background: #e3f2fd; border-left: 4px solid #1e88e5; border-radius: 4px; color: #0d47a1; font-size: 13.5px; margin-bottom: 15px; }
        .compra-box h4 { margin: 0 0 8px 0; font-size: 15px; color: #0d47a1; border-bottom: 1px solid #bbdefb; padding-bottom: 4px; }
        svg { border: 1px solid #ccc; background: #fff; max-height: 80vh; max-width: 100%; border-radius: 4px; }
        .tubo-interno { cursor: pointer; transition: opacity 0.2s; }
        .tubo-interno:hover { opacity: 0.7; stroke: #ff9800 !important; stroke-width: 0.8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 15px; }
        th, td { border: 1px solid #e0e0e0; padding: 7px; text-align: left; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        .subtitulo-tabla { background-color: #f1f3f5; font-weight: bold; color: #495057; font-size: 11.5px; }
        @media print {
            body { display: block; background: white; padding: 0; height: auto; }
            .col-controles, .btn-limpiar, .btn-pdf, .balance-panel { display: none !important; }
            .col-visor { page-break-after: always; box-shadow: none; padding: 0; margin: 0; width: 100%; height: 95vh; justify-content: center; }
            svg { max-height: 85vh; width: 85%; border: none; }
            .col-reporte { box-shadow: none; padding: 0; margin: 0; width: 100%; height: auto; display: block; }
            .panel-tabla { overflow: visible; }
            th { position: static; background-color: #343a40 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .compra-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #e3f2fd !important; border-left: 4px solid #1e88e5 !important; }
        }
    </style>
</head>
<body>
<div class="col-controles">
    <h2>Estructurador LEGO</h2>
    <div id="panelBalance" class="balance-panel">Calculando...</div>
    <button class="btn-limpiar" onclick="limpiarLienzo()">🧹 Limpiar Todo</button>
    <button class="btn-pdf" onclick="window.print()">🖨️ Imprimir Ficha (PDF)</button>
    <div class="panel-inputs">
        <div class="control-group">
            <label>Asistente de Simetría (Espejo):</label>
            <select id="modoEspejo">
                <option value="cruzado" selected>Espejo Cruzado Completo</option>
                <option value="vertical">Espejo Vertical</option>
                <option value="ninguno">Sin Espejo (Libre)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Material Marco Exterior:</label>
            <select id="materialMarco" onchange="inicializarCuadracula()">
                <option value="7.62" selected>Tubo 3x2" (7.62 cm)</option>
                <option value="5.08">Tubo 2x1" (5.08 cm)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Material Estructura Interna:</label>
            <select id="materialInterno" onchange="inicializarCuadracula()">
                <option value="5.08" selected>Tubo 2x1" (5.08 cm)</option>
                <option value="2.54">Tubo 1x1" (2.54 cm)</option>
            </select>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <div class="control-group">
            <label>Ancho Total Marco (cm):</label>
            <input type="number" id="ancho" value="146" oninput="inicializarCuadracula()">
        </div>
        <div class="control-group">
            <label>Alto Total Marco (cm):</label>
            <input type="number" id="alto" value="341" oninput="inicializarCuadracula()">
        </div>
        <div class="control-group">
            <label>Separación Sugerida (cm):</label>
            <input type="number" id="separacion" value="22" oninput="inicializarCuadracula()">
        </div>
    </div>
</div>
<div class="col-visor"><svg id="lienzo" viewBox="0 0 146 341"></svg></div>
<div class="col-reporte">
    <div class="compra-box" id="reporteCompra">
        <h4>📋 Resumen de Compra (Barras 6m + 7% Desperdicio)</h4>
        <div id="detalleCompra">Sin piezas.</div>
    </div>
    <h3>🛠️ Guía de Cortes Lego para el Obrero</h3>
    <div class="panel-tabla">
        <table id="tablaCortes">
            <thead><tr><th>ID / Bloque</th><th>Material</th><th>Medida</th><th>Cant</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script>
let piezasSeleccionadas = {};
let largoUnicoH = 0, largoUnicoV = 0, numEspaciosX = 0, numEspaciosY = 0;
function limpiarLienzo() { piezasSeleccionadas = {}; inicializarCuadracula(); }
function inicializarCuadracula() {
    const anchoTotal = parseFloat(document.getElementById('ancho').value) || 100;
    const altoTotal = parseFloat(document.getElementById('alto').value) || 100;
    const X_deseada = parseFloat(document.getElementById('separacion').value) || 22;
    const marcoCaraExt = parseFloat(document.getElementById('materialMarco').value); 
    const tuboCaraExt  = parseFloat(document.getElementById('materialInterno').value); 
    const lienzo = document.getElementById('lienzo');
    lienzo.setAttribute('viewBox', `0 0 ${anchoTotal} ${altoTotal}`);
    lienzo.innerHTML = ''; 
    const xMin = marcoCaraExt, xMax = anchoTotal - marcoCaraExt, yMin = marcoCaraExt, yMax = altoTotal - marcoCaraExt;
    numEspaciosX = Math.round((xMax - xMin + tuboCaraExt) / (X_deseada + tuboCaraExt)) || 1;
    largoUnicoH = (xMax - xMin - ((numEspaciosX - 1) * tuboCaraExt)) / numEspaciosX;
    numEspaciosY = Math.round((yMax - yMin + tuboCaraExt) / (X_deseada + tuboCaraExt)) || 1;
    largoUnicoV = (yMax - yMin - ((numEspaciosY - 1) * tuboCaraExt)) / numEspaciosY;
    document.getElementById('panelBalance').innerHTML = `Celdas: X=${numEspaciosX}, Y=${numEspaciosY}`;
    const marco = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    marco.setAttribute("x", marcoCaraExt/2); marco.setAttribute("y", marcoCaraExt/2);
    marco.setAttribute("width", anchoTotal - marcoCaraExt); marco.setAttribute("height", altoTotal - marcoCaraExt);
    marco.setAttribute("fill", "none"); marco.setAttribute("stroke", "#002fa7"); marco.setAttribute("stroke-width", marcoCaraExt);
    lienzo.appendChild(marco);
    let xPosiciones = [], yPosiciones = [];
    for(let i=1; i<numEspaciosX; i++) xPosiciones.push(xMin + (i*largoUnicoH) + ((i-1)*tuboCaraExt));
    for(let j=1; j<numEspaciosY; j++) yPosiciones.push(yMin + (j*largoUnicoV) + ((j-1)*tuboCaraExt));
    let xPuntos = [xMin, ...xPosiciones, xMax];
    for (let f=0; f<yPosiciones.length; f++) {
        let yPos = yPosiciones[f];
        for (let c=0; c<xPuntos.length-1; c++) {
            let id = `H_${f}_${c}`;
            if (piezasSeleccionadas[id] === undefined) piezasSeleccionadas[id] = false;
            dibujarSegmentoTubo(id, (c===0?xPuntos[c]:xPuntos[c]+tuboCaraExt), yPos, largoUnicoH, tuboCaraExt, 'H', f, c);
        }
    }
    let yPuntos = [yMin, ...yPosiciones, yMax];
    for (let c=0; c<xPosiciones.length; c++) {
        let xPos = xPosiciones[c];
        for (let f=0; f<yPuntos.length-1; f++) {
            let id = `V_${f}_${c}`;
            if (piezasSeleccionadas[id] === undefined) piezasSeleccionadas[id] = false;
            dibujarSegmentoTubo(id, xPos, (f===0?yPuntos[f]:yPuntos[f]+tuboCaraExt), tuboCaraExt, largoUnicoV, 'V', f, c);
        }
    }
    actualizarFichaCortes();
}
function dibujarSegmentoTubo(id, x, y, w, h, tipo, f, c) {
    const lienzo = document.getElementById('lienzo');
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", x); rect.setAttribute("y", y); rect.setAttribute("width", w); rect.setAttribute("height", h);
    rect.setAttribute("class", "tubo-interno");
    const activo = piezasSeleccionadas[id];
    rect.setAttribute("fill", activo ? "#2b2b2b" : "rgba(224, 224, 224, 0.15)");
    rect.setAttribute("stroke", activo ? "#ffffff" : "#e0e0e0"); rect.setAttribute("stroke-width", "0.2");
    rect.onclick = function() {
        const modo = document.getElementById('modoEspejo').value;
        piezasSeleccionadas[id] = !piezasSeleccionadas[id];
        if (modo !== 'ninguno') {
            let fEspejo = (tipo === 'H') ? (numEspaciosY - 2) - f : (numEspaciosY - 1) - f;
            let cEspejo = (tipo === 'H') ? numEspaciosX - 1 - c : (numEspaciosX - 2) - c;
            if (modo === 'vertical') piezasSeleccionadas[`${tipo}_${fEspejo}_${c}`] = piezasSeleccionadas[id];
            else if (modo === 'cruzado') piezasSeleccionadas[`${tipo}_${fEspejo}_${cEspejo}`] = piezasSeleccionadas[id];
        }
        inicializarCuadracula();
    };
    lienzo.appendChild(rect);
}
function actualizarFichaCortes() {
    const anchoTotal = parseFloat(document.getElementById('ancho').value) || 0;
    const altoTotal = parseFloat(document.getElementById('alto').value) || 0;
    const marcoCaraExt = parseFloat(document.getElementById('materialMarco').value);
    const tuboCaraExt  = parseFloat(document.getElementById('materialInterno').value);
    const nombreMarco = document.getElementById('materialMarco').options[document.getElementById('materialMarco').selectedIndex].text.split(" (")[0];
    const nombreInterno = document.getElementById('materialInterno').options[document.getElementById('materialInterno').selectedIndex].text.split(" (")[0];
    let tramosH = [], tramosV = [], sumaCmsInterno = 0, legoCounter = 1;
    for (let f=0; f<numEspaciosY-1; f++) {
        let enRacha = false, celdas = 0, cInicio = 0;
        for (let c=0; c<numEspaciosX; c++) {
            if (piezasSeleccionadas[`H_${f}_${c}`]) {
                if (!enRacha) cInicio = c; enRacha = true; celdas++;
            } else {
                if (enRacha) {
                    let l = (celdas * largoUnicoH) + ((celdas - 1) * tuboCaraExt);
                    tramosH.push({ longitud: l, idLego: legoCounter, fila: f, colStart: cInicio });
                    sumaCmsInterno += l; legoCounter++;
                }
                enRacha = false; celdas = 0;
            }
        }
        if (enRacha) {
            let l = (celdas * largoUnicoH) + ((celdas - 1) * tuboCaraExt);
            tramosH.push({ longitud: l, idLego: legoCounter, fila: f, colStart: cInicio });
            sumaCmsInterno += l; legoCounter++;
        }
    }
    for (let c=0; c<numEspaciosX-1; c++) {
        let enRacha = false, celdas = 0, fInicio = 0;
        for (let f=0; f<numEspaciosY; f++) {
            if (piezasSeleccionadas[`V_${f}_${c}`]) {
                if (!enRacha) fInicio = f; enRacha = true; celdas++;
            } else {
                if (enRacha) {
                    let l = (celdas * largoUnicoV) + ((celdas - 1) * tuboCaraExt);
                    tramosV.push({ longitud: l, idLego: legoCounter, col: c, filaStart: fInicio });
                    sumaCmsInterno += l; legoCounter++;
                }
                enRacha = false; celdas = 0;
            }
        }
        if (enRacha) {
            let l = (celdas * largoUnicoV) + ((celdas - 1) * tuboCaraExt);
            tramosV.push({ longitud: l, idLego: legoCounter, col: c, filaStart: fInicio });
            sumaCmsInterno += l; legoCounter++;
        }
    }
    tramosH.forEach(t => {
        dibujarTextoLego(marcoCaraExt + (t.colStart*(largoUnicoH+tuboCaraExt)) + (t.longitud/2), marcoCaraExt + (t.fila+1)*(largoUnicoV+tuboCaraExt) - (tuboCaraExt/2) + 1.5, t.idLego);
    });
    tramosV.forEach(t => {
        dibujarTextoLego(marcoCaraExt + (t.col+1)*(largoUnicoH+tuboCaraExt) - (tuboCaraExt/2), marcoCaraExt + (t.filaStart*(largoUnicoV+tuboCaraExt)) + (t.longitud/2) + 2, t.idLego);
    });
    const tablaBody = document.querySelector('#tablaCortes tbody');
    tablaBody.innerHTML = '<tr class="subtitulo-tabla"><td colspan="4">PASO 1: MARCO EXTERIOR ESTRUCTURAL</td></tr>';
    const largoMarcoV = altoTotal - (marcoCaraExt * 2);
    tablaBody.innerHTML += `<tr><td><b>M-H</b></td><td>${nombreMarco}</td><td><mark><b>${anchoTotal.toFixed(1)} cm</b></mark></td><td><strong>2</strong></td></tr>`;
    tablaBody.innerHTML += `<tr><td><b>M-V</b></td><td>${nombreMarco}</td><td><mark><b>${largoMarcoV.toFixed(1)} cm</b></mark></td><td><strong>2</strong></td></tr>`;
    if (tramosH.length > 0) {
        tablaBody.innerHTML += '<tr class="subtitulo-tabla"><td colspan="4">PASO 2: PIEZAS HORIZONTALES INTERNAS</td></tr>';
        tramosH.forEach(t => { tablaBody.innerHTML += `<tr><td><span class="badge-lego">#${t.idLego}</span></td><td>${nombreInterno}</td><td><mark><b>${t.longitud.toFixed(1)} cm</b></mark></td><td><strong>1</strong></td></tr>`; });
    }
    if (tramosV.length > 0) {
        tablaBody.innerHTML += '<tr class="subtitulo-tabla"><td colspan="4">PASO 3: PIEZAS VERTICALES DE ACOPLE</td></tr>';
        tramosV.forEach(t => { tablaBody.innerHTML += `<tr><td><span class="badge-lego">#${t.idLego}</span></td><td>${nombreInterno}</td><td><mark><b>${t.longitud.toFixed(1)} cm</b></mark></td><td><strong>1</strong></td></tr>`; });
    }
    let totalCmsMarco = (anchoTotal * 2) + (largoMarcoV * 2);
    document.getElementById('detalleCompra').innerHTML = `
        <div><b>${nombreMarco}:</b> ${Math.ceil((totalCmsMarco*1.07)/600)} barra(s) <small>(${totalCmsMarco.toFixed(0)} cm)</small></div>
        <div><b>${nombreInterno}:</b> ${Math.ceil((sumaCmsInterno*1.07)/600)} barra(s) <small>(${sumaCmsInterno.toFixed(0)} cm)</small></div>`;
}
function dibujarTextoLego(x, y, num) {
    const lienzo = document.getElementById('lienzo');
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", x); circle.setAttribute("cy", y - 1.5); circle.setAttribute("r", "3.2");
    circle.setAttribute("fill", "#ffffff"); circle.setAttribute("stroke", "#1a1a1a"); circle.setAttribute("stroke-width", "0.4");
    lienzo.appendChild(circle);
    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    txt.setAttribute("x", x); txt.setAttribute("y", y); txt.setAttribute("font-size", "4.5");
    txt.setAttribute("font-weight", "bold"); txt.setAttribute("fill", "#1a1a1a"); txt.setAttribute("text-anchor", "middle");
    txt.textContent = num; lienzo.appendChild(txt);
}
inicializarCuadracula();
</script>
</body>
</html>
